<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DStructViewerAPP</title>
    <link rel="icon" href="data:,"> <!-- Prevent favicon 404 error -->
    <style>
        /* General styles */
        body {
            margin: 0;
            overflow: hidden; /* Prevent scrollbars */
            font-family: Arial, sans-serif;
        }

        /* Title styling */
        #title {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: rgb(10, 146, 209);
            font-size: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.6);
            z-index: 1; /* Ensure it appears above the canvas */
        }

        /* Canvas styling */
        canvas {
            display: block; /* Remove extra space below canvas */
        }

        /* View cube — fixed preset views (N/S/E/W + ISO) */
        #viewcube {
            position: absolute;
            top: 12px;
            right: 12px;
            display: grid;
            grid-template-columns: 36px 36px 36px;
            grid-template-rows: 36px 36px 36px;
            gap: 4px;
            z-index: 2;
            user-select: none;
        }
        #viewcube button {
            font: bold 12px Arial, sans-serif;
            background: rgba(255, 255, 255, 0.85);
            color: #333;
            border: 1px solid #888;
            border-radius: 4px;
            cursor: pointer;
        }
        #viewcube button:hover { background: rgba(10, 146, 209, 0.85); color: #fff; }
        #viewcube .nw, #viewcube .ne, #viewcube .sw, #viewcube .se { background: rgba(255, 255, 255, 0.6); }

        /* Autocenter button — refits the camera to the model bounding box */
        #autocenter {
            position: absolute;
            top: 136px;  /* sits just under the 3x3 view cube */
            right: 12px;
            width: 116px;
            height: 30px;
            font: bold 12px Arial, sans-serif;
            background: rgba(255, 255, 255, 0.9);
            color: #0a92d1;
            border: 1px solid #0a92d1;
            border-radius: 4px;
            cursor: pointer;
            z-index: 2;
        }
        #autocenter:hover { background: rgba(10, 146, 209, 0.9); color: #fff; }
    </style>
</head>
<body>
    <!-- Project Title -->
    <div id="title">3DStructViewerAPP(3DGraphicStatics) : ❤️ by exDAS (Abhishek S) </div>

    <!-- View cube (preset two-point perspective views) -->
    <div id="viewcube">
        <button class="nw" data-view="NW">NW</button>
        <button data-view="N">N</button>
        <button class="ne" data-view="NE">NE</button>
        <button data-view="W">W</button>
        <button data-view="ISO">ISO</button>
        <button data-view="E">E</button>
        <button class="sw" data-view="SW">SW</button>
        <button data-view="S">S</button>
        <button class="se" data-view="SE">SE</button>
    </div>
    <button id="autocenter">⌂ Autocenter</button>

    <!-- Import Maps Polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>

    <!-- Import Map for Dependencies -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.module.js",
                "three/examples/jsm/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/three@0.132.2/examples/jsm/controls/OrbitControls.js",
                "rhino3dm": "https://cdn.jsdelivr.net/npm/rhino3dm@8.17.0/rhino3dm.module.min.js"
            }
        }
    </script>

    <!-- Main Application Logic -->
    <script type="module" src="script.js"></script>
</body>
</html>
