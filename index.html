<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rhino3dm.js + Three.js Demo</title>
</head>
<body>
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>

    <!-- Import map for rhino3dm -->
    <script type="importmap">
    {
        "imports": {
            "rhino3dm": "https://cdn.jsdelivr.net/npm/rhino3dm@8.17.0/rhino3dm.module.min.js",
            "three": "https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.module.js",
            "three/": "https://cdn.jsdelivr.net/npm/three@0.132.2/"
        }
    }
    </script>

    <!-- Main app logic -->
    <script type="module" src="script.js"></script>
</body>
</html>
