<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhino3dm.js + Three.js Viewer</title>
    <link rel="icon" href="data:,"> <!-- Prevent favicon 404 error -->
    <style>
        /* General styles */
        body {
            margin: 0;
            overflow: hidden; /* Prevent scrollbars */
            font-family: Arial, sans-serif;
        }

        /* Title styling */
        #title {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            z-index: 1; /* Ensure it appears above the canvas */
        }

        /* Canvas styling */
        canvas {
            display: block; /* Remove extra space below canvas */
        }
    </style>
</head>
<body>
    <!-- Project Title -->
    <div id="title">My Rhino3dm.js + Three.js Project</div>

    <!-- Import Maps Polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>

    <!-- Import Map for Dependencies -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.module.js",
                "three/examples/jsm/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/three@0.132.2/examples/jsm/controls/OrbitControls.js",
                "rhino3dm": "https://cdn.jsdelivr.net/npm/rhino3dm@8.17.0/rhino3dm.module.min.js"
            }
        }
    </script>

    <!-- Main Application Logic -->
    <script type="module" src="script.js"></script>
</body>
</html>
